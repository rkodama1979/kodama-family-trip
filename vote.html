<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>家族投票｜2027年 コダマ家旅行計画</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="vote-page">
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="brand">
      <span class="brand-name">2027年 コダマ家旅行計画</span>
      <span class="brand-subtitle">絶景とご当地グルメをめぐる、2泊3日の旅</span>
    </a>
    <a class="text-link" href="index.html">トップへ ←</a>
  </div>
</header>

<main>
  <section class="compare-hero">
    <div class="section-inner">
      <p class="eyebrow">家族投票</p>
      <h1>行きたい旅先を選ぶ</h1>
      <p>第一希望・第二希望を決めて、最後にGoogleフォームへ入力します。</p>
    </div>
  </section>

  <section class="section">
    <div class="section-inner">
      <div class="vote-form-card">
        <h2>投票フォーム接続前</h2>
        <p>Googleフォームを作成後、下のボタンを正式な投票フォームへ置き換えます。</p>

        <div class="vote-choice-grid">
          <span>静岡</span><span>石川</span><span>三重</span><span>岡山</span>
          <span>愛媛</span><span>大分</span><span>宮崎</span><span>鹿児島</span>
        </div>

        <div class="notice-card">
          Googleフォームには「名前」「第一希望」「第二希望」「コメント」の4項目を用意すると集計しやすくなります。
        </div>

        <a class="button button-primary" href="compare.html">候補地をもう一度比較する</a>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div><strong>2027年 コダマ家旅行計画</strong><span class="footer-subtitle">家族で選ぶ、次の旅先</span></div>
    <a href="#">ページ上部へ ↑</a>
  </div>
</footer>
</body>
</html>
